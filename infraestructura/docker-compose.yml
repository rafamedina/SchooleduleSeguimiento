version: "3.8"

services:
  # --- SERVICIO DE BASE DE DATOS (PostgreSQL) ---
  postgres:
    container_name: schooledule_db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${DB_PORT}:5432" # Solo accesible localmente para seguridad
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SERVICIO DE GESTIÓN VISUAL (pgAdmin) ---
  pgadmin:
    container_name: schooledule_pgadmin
    image: dpage/pgadmin4:8.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - db_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  # --- SERVICIO DE LA APLICACIÓN (Spring Boot) ---
  app:
    container_name: schooledule_app
    build:
      context: ..
      dockerfile: infraestructura/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "${APP_PORT}:8080"
    networks:
      - app_net
      - db_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.8"

          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true # La red de la base de datos es privada

volumes:
  postgres_data:
  pgadmin_data:
