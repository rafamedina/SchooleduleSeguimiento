repos:
  # --- HOOKS BÁSICOS ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict

  # --- SEGURIDAD ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # --- JAVA: Spotless (Google Style via Maven) ---
  - repo: local
    hooks:
      - id: spotless-apply
        name: ✨ Spotless Apply
        entry: pwsh -NoProfile -Command "./mvnw spotless:apply"
        language: system
        files: "\\.java$"
        pass_filenames: false

  # --- FRONTEND & CONFIG ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [css, javascript, scss, markdown, xml, yaml, html]
        additional_dependencies:
          - "prettier@3.1.0"
          - "@prettier/plugin-xml@3.4.1"

  # --- MAVEN VALIDATE ---
  - repo: local
    hooks:
      - id: maven-check
        name: 🔨 Maven Validate
        entry: pwsh -NoProfile -Command "./mvnw validate"
        language: system
        files: pom.xml
        pass_filenames: false
