<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceder — Schooledule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Geist:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="login-shell">
      <!-- Columna decorativa izquierda -->
      <aside class="login-aside" aria-hidden="true">
        <span class="aside-word">Schoo&shy;ledule</span>
        <span class="aside-sub">Plataforma académica</span>
      </aside>

      <!-- Columna del formulario -->
      <main class="login-main">
        <div class="login-card">
          <!-- Cabecera -->
          <header class="login-card__header">
            <p class="login-card__eyebrow">Claustro · Acceso</p>
            <h1 class="login-card__title">Bienvenido<br /><em>de nuevo</em></h1>
          </header>

          <!-- Alertas -->
          <div
            th:if="${param.error}"
            class="login-alert login-alert--error"
            role="alert"
          >
            Correo o contraseña incorrectos.
          </div>
          <div
            th:if="${param.logout}"
            class="login-alert login-alert--ok"
            role="status"
          >
            Sesión cerrada correctamente.
          </div>

          <!-- Formulario -->
          <form
            method="post"
            th:action="@{/login}"
            class="login-form"
            novalidate
          >
            <div class="login-form__group">
              <label class="login-form__label" for="username"
                >Correo electrónico</label
              >
              <input
                class="login-form__input"
                type="email"
                id="username"
                name="username"
                autocomplete="email"
                placeholder="juan@centro.es"
                required
              />
            </div>

            <div class="login-form__group">
              <label class="login-form__label" for="password">Contraseña</label>
              <input
                class="login-form__input"
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="login-form__submit">Entrar</button>
          </form>

          <footer class="login-card__footer">
            <span>Schooledule</span>
            <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"
              >2026</span
            >
          </footer>
        </div>
      </main>
    </div>
  </body>
</html>
