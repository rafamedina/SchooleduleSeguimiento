<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{centro-admin/fragments/layout :: head('Dashboard')}"
  ></head>
  <body>
    <div class="admin-shell">
      <div
        th:replace="~{centro-admin/fragments/layout :: sidebar('dashboard')}"
      ></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <span>Admin de Centro</span>
            </nav>
            <h1 class="hero__title">Panel de <em>Centro</em></h1>
          </div>
        </div>

        <div class="animate-in">
          <div th:if="${centros != null and !centros.isEmpty()}">
            <p style="color: var(--ink-muted); margin-bottom: 1.5rem">
              Gestionas
              <strong th:text="${stats.numCentros}">1</strong>
              centro(s):
              <span
                th:each="c, iter : ${centros}"
                th:text="${c.nombre} + (${iter.last} ? '' : ', ')"
              ></span>
            </p>
          </div>

          <div
            class="stats-grid"
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 1rem;
              margin-bottom: 2rem;
            "
          >
            <div
              class="stat-card"
              style="
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem;
              "
            >
              <div
                class="stat-card__value"
                th:text="${stats.numGrupos}"
                style="font-size: 2rem; font-weight: 700"
              >
                0
              </div>
              <div class="stat-card__label" style="color: var(--ink-muted)">
                Grupos
              </div>
            </div>
            <div
              class="stat-card"
              style="
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem;
              "
            >
              <div
                class="stat-card__value"
                th:text="${stats.numImparticiones}"
                style="font-size: 2rem; font-weight: 700"
              >
                0
              </div>
              <div class="stat-card__label" style="color: var(--ink-muted)">
                Imparticiones
              </div>
            </div>
            <div
              class="stat-card"
              style="
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem;
              "
            >
              <div
                class="stat-card__value"
                th:text="${stats.numAlumnos}"
                style="font-size: 2rem; font-weight: 700"
              >
                0
              </div>
              <div class="stat-card__label" style="color: var(--ink-muted)">
                Alumnos activos
              </div>
            </div>
          </div>

          <div
            class="quick-links"
            style="display: flex; gap: 0.75rem; flex-wrap: wrap"
          >
            <a th:href="@{/centro-admin/grupos}" class="btn btn-secondary"
              >Gestionar Grupos</a
            >
            <a
              th:href="@{/centro-admin/imparticiones}"
              class="btn btn-secondary"
              >Gestionar Imparticiones</a
            >
            <a th:href="@{/centro-admin/alumnos}" class="btn btn-secondary"
              >Gestionar Alumnos</a
            >
            <a th:href="@{/centro-admin/usuarios}" class="btn btn-secondary"
              >Gestionar Usuarios</a
            >
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
