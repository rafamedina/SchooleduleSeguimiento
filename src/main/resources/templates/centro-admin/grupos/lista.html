<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{centro-admin/fragments/layout :: head('Grupos')}"></head>
  <body>
    <div class="admin-shell">
      <div
        th:replace="~{centro-admin/fragments/layout :: sidebar('grupos')}"
      ></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/centro-admin/dashboard}">Centro Admin</a>
              <span class="breadcrumb__sep">/</span>
              <span>Grupos</span>
            </nav>
            <h1 class="hero__title">Gestión de <em>Grupos</em></h1>
          </div>
          <div class="hero__right">
            <a th:href="@{/centro-admin/grupos/nuevo}" class="btn btn-primary"
              >Nuevo grupo</a
            >
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <div th:if="${#lists.isEmpty(grupos)}" class="empty-state">
            <p>No hay grupos en tus centros.</p>
            <a th:href="@{/centro-admin/grupos/nuevo}" class="btn btn-primary"
              >Crear el primero</a
            >
          </div>

          <table class="table" th:unless="${#lists.isEmpty(grupos)}">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Centro</th>
                <th>Curso Académico</th>
                <th>Tutor</th>
                <th>Imparticiones</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="g : ${grupos}">
                <td th:text="${g.nombre}"></td>
                <td th:text="${g.centroNombre}"></td>
                <td th:text="${g.cursoAcademicoNombre}"></td>
                <td
                  th:text="${g.tutorNombre != null ? g.tutorNombre : '—'}"
                ></td>
                <td th:text="${g.numImparticiones}"></td>
                <td>
                  <a
                    th:href="@{/centro-admin/grupos/{id}/editar(id=${g.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:action="@{/centro-admin/grupos/{id}/eliminar(id=${g.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm btn-danger"
                      onclick="return confirm('¿Eliminar este grupo?')"
                    >
                      Eliminar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
