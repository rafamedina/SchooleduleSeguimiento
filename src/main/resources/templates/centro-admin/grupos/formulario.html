<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{centro-admin/fragments/layout :: head(${form.id != null} ? 'Editar grupo' : 'Nuevo grupo')}"
  ></head>
  <body>
    <div class="admin-shell">
      <div
        th:replace="~{centro-admin/fragments/layout :: sidebar('grupos')}"
      ></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/centro-admin/dashboard}">Centro Admin</a>
              <span class="breadcrumb__sep">/</span>
              <a th:href="@{/centro-admin/grupos}">Grupos</a>
              <span class="breadcrumb__sep">/</span>
              <span th:text="${form.id != null} ? 'Editar' : 'Nuevo'"
                >Nuevo</span
              >
            </nav>
            <h1 class="hero__title">
              <span th:text="${form.id != null} ? 'Editar' : 'Nuevo'"
                >Nuevo</span
              >
              <em>Grupo</em>
            </h1>
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <form
            th:action="${form.id != null} ? @{/centro-admin/grupos/{id}/editar(id=${form.id})} : @{/centro-admin/grupos/nuevo}"
            th:object="${form}"
            method="post"
          >
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input
                type="text"
                id="nombre"
                th:field="*{nombre}"
                class="form-control"
                th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                placeholder="Ej: 1DAW-A"
              />
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('nombre')}"
                th:errors="*{nombre}"
              ></div>
            </div>

            <div class="form-group">
              <label for="centroId">Centro</label>
              <select
                id="centroId"
                th:field="*{centroId}"
                class="form-control"
                th:classappend="${#fields.hasErrors('centroId')} ? 'is-invalid' : ''"
              >
                <option value="">-- Selecciona un centro --</option>
                <option
                  th:each="c : ${centros}"
                  th:value="${c.id}"
                  th:text="${c.nombre}"
                ></option>
              </select>
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('centroId')}"
                th:errors="*{centroId}"
              ></div>
            </div>

            <div class="form-group">
              <label for="cursoAcademicoId">Curso Académico</label>
              <select
                id="cursoAcademicoId"
                th:field="*{cursoAcademicoId}"
                class="form-control"
                th:classappend="${#fields.hasErrors('cursoAcademicoId')} ? 'is-invalid' : ''"
              >
                <option value="">-- Selecciona un curso --</option>
                <option
                  th:each="ca : ${cursos}"
                  th:value="${ca.id}"
                  th:text="${ca.nombre}"
                ></option>
              </select>
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('cursoAcademicoId')}"
                th:errors="*{cursoAcademicoId}"
              ></div>
            </div>

            <div class="form-group">
              <label for="tutorId"
                >Tutor del grupo <small>(opcional)</small></label
              >
              <select id="tutorId" th:field="*{tutorId}" class="form-control">
                <option value="">-- Sin tutor --</option>
                <option
                  th:each="p : ${profesores}"
                  th:value="${p.id}"
                  th:text="${p.apellidos + ', ' + p.nombre}"
                ></option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/centro-admin/grupos}" class="btn btn-secondary"
              >Cancelar</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
