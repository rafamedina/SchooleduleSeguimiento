<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schooledule — Seleccionar Perfil</title>
    <link rel="stylesheet" th:href="@{/css/seleccionar-rol.css}" />
  </head>
  <body>
    <div class="roles-shell page-content">
      <p class="roles-eyebrow animate-in">Schooledule</p>
      <h1 class="roles-title animate-in">¿Con qué perfil accedes?</h1>

      <div class="roles-grid">
        <!-- card ADMIN -->
        <a
          href="/admin/dashboard"
          class="role-card animate-in"
          th:if="${roles.contains('ROLE_ADMIN')}"
        >
          <div class="role-card__icon">✦</div>
          <span class="role-card__name">Administrador</span>
          <p class="role-card__desc">
            Gestión de infraestructura, usuarios y centros educativos.
          </p>
        </a>

        <!-- card PROFESOR -->
        <a
          href="/profe/dashboard"
          class="role-card animate-in"
          th:if="${roles.contains('ROLE_PROFESOR')}"
        >
          <div class="role-card__icon">✎</div>
          <span class="role-card__name">Profesor</span>
          <p class="role-card__desc">
            Gestión de grupos, evaluaciones y seguimiento de alumnos.
          </p>
        </a>

        <!-- card ALUMNO -->
        <a
          href="/alumno/dashboard"
          class="role-card animate-in"
          th:if="${roles.contains('ROLE_ALUMNO')}"
        >
          <div class="role-card__icon">⚒</div>
          <span class="role-card__name">Alumno</span>
          <p class="role-card__desc">
            Consulta de calificaciones, horarios y expediente académico.
          </p>
        </a>
      </div>

      <div class="roles-logout animate-in">
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="btn-editorial-ghost">
            Cerrar sesión
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
