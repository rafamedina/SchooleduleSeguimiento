<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Schooledule - Seleccionar Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-role {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }
      .card-role:hover {
        transform: translateY(-5px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .icon-role {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #0d6efd;
      }
    </style>
  </head>
  <body>
    <div class="container text-center">
      <div class="mb-5">
        <h1 class="display-5 fw-bold text-primary">Schooledule</h1>
        <p class="lead">
          Selecciona con qué perfil deseas acceder para esta sesión.
        </p>
      </div>

      <div class="row justify-content-center g-4">
        <!-- ADMIN -->
        <div class="col-md-3" th:if="${roles.contains('ROLE_ADMIN')}">
          <a
            href="/admin/dashboard"
            class="card card-role h-100 p-4 border-0 shadow-sm"
          >
            <i class="bi bi-shield-lock-fill icon-role"></i>
            <h4 class="fw-bold">Administrador</h4>
            <p class="text-muted small">
              Gestión de infraestructura, usuarios y centros.
            </p>
          </a>
        </div>
        <!-- PROFESOR -->
        <div class="col-md-3" th:if="${roles.contains('ROLE_PROFESOR')}">
          <a
            href="/profe/menuProfesor"
            class="card card-role h-100 p-4 border-0 shadow-sm"
          >
            <i class="bi bi-person-workspace icon-role"></i>
            <h4 class="fw-bold">Profesor</h4>
            <p class="text-muted small">
              Gestión de grupos, evaluaciones y seguimiento.
            </p>
          </a>
        </div>
        <!-- ALUMNO -->
        <div class="col-md-3" th:if="${roles.contains('ROLE_ALUMNO')}">
          <a
            href="/alumno/dashboard"
            class="card card-role h-100 p-4 border-0 shadow-sm"
          >
            <i class="bi bi-mortarboard-fill icon-role"></i>
            <h4 class="fw-bold">Alumno</h4>
            <p class="text-muted small">
              Consulta de notas, horarios y perfil académico.
            </p>
          </a>
        </div>
      </div>

      <div class="mt-5">
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="btn btn-outline-secondary btn-sm">
            Cerrar sesión
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
