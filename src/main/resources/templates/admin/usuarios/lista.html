<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Usuarios')}"></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('usuarios')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <span>Usuarios</span>
            </nav>
            <h1 class="hero__title">Gestión de <em>Usuarios</em></h1>
          </div>
          <div class="hero__right">
            <a
              th:href="@{/admin/usuarios/importar}"
              class="btn btn-secondary"
              style="margin-right: 0.5rem"
              >Importar usuarios</a
            >
            <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary"
              >Nuevo usuario</a
            >
          </div>
        </div>

        <div
          th:if="${error}"
          class="alert alert--error animate-in"
          th:text="${error}"
        ></div>

        <div class="animate-in">
          <form method="get" action="/admin/usuarios" class="filter-bar">
            <select name="rolNombre">
              <option value="">Todos los roles</option>
              <option
                th:each="r : ${roles}"
                th:value="${r}"
                th:text="${r}"
                th:selected="${rolNombre != null and rolNombre == r}"
              ></option>
            </select>
            <button type="submit" class="btn btn-secondary btn-sm">
              Filtrar
            </button>
            <a th:href="@{/admin/usuarios}" class="btn btn-sm">Limpiar</a>
          </form>

          <div th:if="${#lists.isEmpty(usuarios)}" class="empty-state">
            <p>No hay usuarios registrados.</p>
            <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary"
              >Crear el primero</a
            >
          </div>
          <table class="table" th:unless="${#lists.isEmpty(usuarios)}">
            <thead>
              <tr>
                <th>Username</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Activo</th>
                <th>Roles</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="u : ${usuarios}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.nombre + ' ' + u.apellidos}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.activo ? 'Sí' : 'No'}"></td>
                <td th:text="${#strings.listJoin(u.roles, ', ')}"></td>
                <td>
                  <a
                    th:href="@{/admin/usuarios/{id}/editar(id=${u.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:action="@{/admin/usuarios/{id}/toggle-activo(id=${u.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm"
                      th:text="${u.activo ? 'Desactivar' : 'Activar'}"
                    >
                      Activar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
