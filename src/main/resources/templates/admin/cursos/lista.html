<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/fragments/layout :: head('Cursos Académicos')}"
  ></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('cursos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <span>Cursos Académicos</span>
            </nav>
            <h1 class="hero__title">Cursos <em>Académicos</em></h1>
          </div>
          <div class="hero__right">
            <a th:href="@{/admin/cursos/nuevo}" class="btn btn-primary"
              >Nuevo curso</a
            >
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <div th:if="${#lists.isEmpty(cursos)}" class="empty-state">
            <p>No hay cursos académicos registrados.</p>
            <a th:href="@{/admin/cursos/nuevo}" class="btn btn-primary"
              >Crear el primero</a
            >
          </div>

          <table class="table" th:unless="${#lists.isEmpty(cursos)}">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Grupos</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr
                th:each="c : ${cursos}"
                th:classappend="${c.activo} ? 'table-row--active' : ''"
              >
                <td th:text="${c.nombre}"></td>
                <td
                  th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"
                ></td>
                <td
                  th:text="${#temporals.format(c.fechaFin, 'dd/MM/yyyy')}"
                ></td>
                <td th:text="${c.numGrupos}"></td>
                <td>
                  <span
                    th:text="${c.activo} ? 'ACTIVO' : (${c.fechaFin.isBefore(#temporals.createToday())} ? 'CERRADO' : 'PENDIENTE')"
                    th:classappend="${c.activo} ? 'badge badge--active' : 'badge badge--inactive'"
                  ></span>
                </td>
                <td>
                  <a
                    th:href="@{/admin/cursos/{id}/editar(id=${c.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:if="${!c.activo}"
                    th:action="@{/admin/cursos/{id}/activar(id=${c.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-sm btn-primary">
                      Activar
                    </button>
                  </form>
                  <form
                    th:if="${c.activo}"
                    th:action="@{/admin/cursos/{id}/cerrar(id=${c.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm"
                      onclick="return confirm('¿Cerrar este curso académico?')"
                    >
                      Cerrar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
