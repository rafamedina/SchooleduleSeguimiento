<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Editar módulo')}"></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('modulos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <a th:href="@{/admin/modulos}">Módulos</a>
              <span class="breadcrumb__sep">/</span>
              <span>Editar</span>
            </nav>
            <h1 class="hero__title">Editar <em>Módulo</em></h1>
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>
          <div
            th:if="${exito}"
            class="alert alert-success"
            th:text="${exito}"
          ></div>

          <form
            th:action="@{/admin/modulos/{id}/editar(id=${moduloId})}"
            th:object="${form}"
            method="post"
          >
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />

            <!-- Datos del módulo -->
            <div
              class="stat-card"
              style="margin-bottom: 2rem; border-top-color: var(--accent)"
            >
              <p style="margin: 0 0 1rem; font-weight: 600">Datos del módulo</p>

              <div class="form-group">
                <label for="codigo">Código</label>
                <input
                  type="text"
                  id="codigo"
                  th:field="*{codigo}"
                  class="form-control"
                  th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid' : ''"
                  style="text-transform: uppercase"
                />
                <div
                  class="invalid-feedback"
                  th:if="${#fields.hasErrors('codigo')}"
                  th:errors="*{codigo}"
                ></div>
              </div>

              <div class="form-group">
                <label for="nombre">Nombre</label>
                <input
                  type="text"
                  id="nombre"
                  th:field="*{nombre}"
                  class="form-control"
                  th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                />
                <div
                  class="invalid-feedback"
                  th:if="${#fields.hasErrors('nombre')}"
                  th:errors="*{nombre}"
                ></div>
              </div>
            </div>

            <!-- RAs y CEs -->
            <div th:if="${#lists.isEmpty(form.ras)}" class="empty-state">
              <p>
                Este módulo no tiene RAs definidos. Usa
                <a th:href="@{/admin/modulos/importar}">Importar módulo</a>
                para añadir RAs y CEs desde Excel.
              </p>
            </div>

            <div th:unless="${#lists.isEmpty(form.ras)}">
              <p style="font-weight: 600; margin-bottom: 1rem">
                Resultados de Aprendizaje y Criterios de Evaluación
              </p>

              <div
                th:each="ra, raIdx : *{ras}"
                class="stat-card"
                style="margin-bottom: 1.5rem"
              >
                <!-- Hidden fields para reenviar datos de display al servidor en caso de error -->
                <input type="hidden" th:field="*{ras[__${raIdx.index}__].id}" />
                <input
                  type="hidden"
                  th:field="*{ras[__${raIdx.index}__].codigo}"
                />
                <input
                  type="hidden"
                  th:field="*{ras[__${raIdx.index}__].descripcion}"
                />
                <input
                  type="hidden"
                  th:field="*{ras[__${raIdx.index}__].cursoNombre}"
                />

                <!-- Cabecera RA -->
                <div
                  style="
                    display: flex;
                    align-items: baseline;
                    gap: 0.75rem;
                    margin-bottom: 0.75rem;
                  "
                >
                  <span
                    style="
                      font-family: var(--font-mono);
                      font-weight: 700;
                      font-size: 0.875rem;
                      background: var(--accent);
                      color: #fff;
                      padding: 0.125rem 0.5rem;
                      border-radius: 4px;
                    "
                    th:text="${ra.codigo}"
                  ></span>
                  <span
                    style="font-size: 0.875rem; color: var(--ink-soft)"
                    th:text="${ra.cursoNombre}"
                  ></span>
                  <span
                    style="flex: 1; font-size: 0.875rem"
                    th:text="${ra.descripcion}"
                  ></span>
                </div>

                <!-- Peso RA -->
                <div
                  class="form-group"
                  style="max-width: 200px; margin-bottom: 1rem"
                >
                  <label
                    th:for="|ras${raIdx.index}PesoSugerido|"
                    style="font-size: 0.8rem"
                    >Peso RA (%)</label
                  >
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    max="100"
                    class="form-control"
                    th:id="|ras${raIdx.index}PesoSugerido|"
                    th:field="*{ras[__${raIdx.index}__].pesoSugerido}"
                  />
                </div>

                <!-- CEs -->
                <div th:unless="${#lists.isEmpty(ra.ces)}">
                  <table class="table" style="font-size: 0.85rem">
                    <thead>
                      <tr>
                        <th style="width: 70px">CE</th>
                        <th>Descripción</th>
                        <th style="width: 130px">Peso CE (%)</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="ce, ceIdx : ${ra.ces}">
                        <td>
                          <input
                            type="hidden"
                            th:field="*{ras[__${raIdx.index}__].ces[__${ceIdx.index}__].id}"
                          />
                          <input
                            type="hidden"
                            th:field="*{ras[__${raIdx.index}__].ces[__${ceIdx.index}__].codigo}"
                          />
                          <input
                            type="hidden"
                            th:field="*{ras[__${raIdx.index}__].ces[__${ceIdx.index}__].descripcion}"
                          />
                          <span
                            style="
                              font-family: var(--font-mono);
                              font-size: 0.8rem;
                            "
                            th:text="${ce.codigo}"
                          ></span>
                        </td>
                        <td th:text="${ce.descripcion}"></td>
                        <td>
                          <input
                            type="number"
                            step="0.01"
                            min="0"
                            max="100"
                            class="form-control"
                            style="width: 110px"
                            th:field="*{ras[__${raIdx.index}__].ces[__${ceIdx.index}__].peso}"
                          />
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div style="margin-top: 1.5rem">
              <button type="submit" class="btn btn-primary">
                Guardar cambios
              </button>
              <a
                th:href="@{/admin/modulos}"
                class="btn btn-secondary"
                style="margin-left: 0.5rem"
                >Cancelar</a
              >
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
