<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Imparticiones')}"></head>
  <body>
    <div class="admin-shell">
      <div
        th:replace="~{admin/fragments/layout :: sidebar('imparticiones')}"
      ></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <span>Imparticiones</span>
            </nav>
            <h1 class="hero__title">Gestión de <em>Imparticiones</em></h1>
          </div>
          <div class="hero__right">
            <a th:href="@{/admin/imparticiones/nuevo}" class="btn btn-primary"
              >Nueva impartición</a
            >
          </div>
        </div>

        <div class="animate-in">
          <form method="get" action="/admin/imparticiones" class="filter-bar">
            <select name="centroId">
              <option value="">Todos los centros</option>
              <option
                th:each="c : ${centros}"
                th:value="${c.id}"
                th:text="${c.nombre}"
                th:selected="${filtro != null and filtro.centroId() != null and filtro.centroId() == c.id}"
              ></option>
            </select>
            <select name="grupoId">
              <option value="">Todos los grupos</option>
              <option
                th:each="g : ${grupos}"
                th:value="${g.id}"
                th:text="${g.nombre}"
                th:selected="${filtro != null and filtro.grupoId() != null and filtro.grupoId() == g.id}"
              ></option>
            </select>
            <select name="moduloId">
              <option value="">Todos los módulos</option>
              <option
                th:each="m : ${modulos}"
                th:value="${m.id}"
                th:text="${m.nombre}"
                th:selected="${filtro != null and filtro.moduloId() != null and filtro.moduloId() == m.id}"
              ></option>
            </select>
            <select name="profesorId">
              <option value="">Todos los profesores</option>
              <option
                th:each="p : ${profesores}"
                th:value="${p.id}"
                th:text="${p.apellidos + ', ' + p.nombre}"
                th:selected="${filtro != null and filtro.profesorId() != null and filtro.profesorId() == p.id}"
              ></option>
            </select>
            <select name="cursoAcademicoId">
              <option value="">Todos los años</option>
              <option
                th:each="cu : ${cursos}"
                th:value="${cu.id}"
                th:text="${cu.nombre}"
                th:selected="${filtro != null and filtro.cursoAcademicoId() != null and filtro.cursoAcademicoId() == cu.id}"
              ></option>
            </select>
            <button type="submit" class="btn btn-secondary btn-sm">
              Filtrar
            </button>
            <a th:href="@{/admin/imparticiones}" class="btn btn-sm">Limpiar</a>
          </form>

          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <div th:if="${#lists.isEmpty(imparticiones)}" class="empty-state">
            <p>No hay imparticiones registradas.</p>
          </div>

          <table class="table" th:unless="${#lists.isEmpty(imparticiones)}">
            <thead>
              <tr>
                <th>Módulo</th>
                <th>Grupo</th>
                <th>Centro</th>
                <th>Profesor</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="i : ${imparticiones}">
                <td>
                  <span th:text="${i.moduloCodigo}"></span>
                  —
                  <span th:text="${i.moduloNombre}"></span>
                </td>
                <td th:text="${i.grupoNombre}"></td>
                <td th:text="${i.centroNombre}"></td>
                <td th:text="${i.profesorNombreCompleto}"></td>
                <td>
                  <a
                    th:href="@{/admin/imparticiones/{id}/editar(id=${i.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:action="@{/admin/imparticiones/{id}/eliminar(id=${i.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <button
                      type="submit"
                      class="btn btn-sm btn-danger"
                      onclick="return confirm('¿Seguro que deseas eliminar esta impartición?')"
                    >
                      Eliminar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>

      <div th:replace="~{admin/fragments/layout :: colophon}"></div>
    </div>
  </body>
</html>
