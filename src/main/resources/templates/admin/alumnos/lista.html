<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Alumnos')}"></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('alumnos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <span>Alumnos</span>
            </nav>
            <h1 class="hero__title">Gestión de <em>Alumnos</em></h1>
          </div>
        </div>

        <div class="animate-in">
          <form method="get" action="/admin/alumnos" class="filter-bar">
            <select name="centroId">
              <option value="">Todos los centros</option>
              <option
                th:each="c : ${centros}"
                th:value="${c.id}"
                th:text="${c.nombre}"
                th:selected="${filtro != null and filtro.centroId() != null and filtro.centroId() == c.id}"
              ></option>
            </select>
            <select name="grupoId">
              <option value="">Todos los grupos</option>
              <option
                th:each="g : ${grupos}"
                th:value="${g.id}"
                th:text="${g.nombre}"
                th:selected="${filtro != null and filtro.grupoId() != null and filtro.grupoId() == g.id}"
              ></option>
            </select>
            <select name="cursoAcademicoId">
              <option value="">Todos los años</option>
              <option
                th:each="cu : ${cursos}"
                th:value="${cu.id}"
                th:text="${cu.nombre}"
                th:selected="${filtro != null and filtro.cursoAcademicoId() != null and filtro.cursoAcademicoId() == cu.id}"
              ></option>
            </select>
            <button type="submit" class="btn btn-secondary btn-sm">
              Filtrar
            </button>
            <a th:href="@{/admin/alumnos}" class="btn btn-sm">Limpiar</a>
          </form>

          <div th:if="${#lists.isEmpty(alumnos)}" class="empty-state">
            <p>No hay alumnos registrados.</p>
          </div>

          <table class="table" th:unless="${#lists.isEmpty(alumnos)}">
            <thead>
              <tr>
                <th>Apellidos</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Matrículas</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="a : ${alumnos}">
                <td th:text="${a.apellidos}"></td>
                <td th:text="${a.nombre}"></td>
                <td th:text="${a.email}"></td>
                <td th:text="${a.numMatriculas}"></td>
                <td>
                  <a
                    th:href="@{/admin/alumnos/{id}/matriculas(id=${a.id})}"
                    class="btn btn-sm btn-secondary"
                    >Ver matrículas</a
                  >
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
