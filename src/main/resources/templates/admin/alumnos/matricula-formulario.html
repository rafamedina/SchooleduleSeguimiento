<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/fragments/layout :: head(${form.id != null} ? 'Editar matrícula' : 'Nueva matrícula')}"
  ></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('alumnos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <a th:href="@{/admin/alumnos}">Alumnos</a>
              <span class="breadcrumb__sep">/</span>
              <a
                th:href="@{/admin/alumnos/{id}/matriculas(id=${alumno.id})}"
                th:text="${alumno.apellidos + ', ' + alumno.nombre}"
                >Alumno</a
              >
              <span class="breadcrumb__sep">/</span>
              <span th:text="${form.id != null} ? 'Editar' : 'Nueva'"
                >Nueva</span
              >
            </nav>
            <h1 class="hero__title">
              <span th:text="${form.id != null} ? 'Editar' : 'Nueva'"
                >Nueva</span
              >
              <em>Matrícula</em>
            </h1>
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <form
            th:action="${form.id != null}
              ? @{/admin/alumnos/{alumnoId}/matriculas/{id}/editar(alumnoId=${alumno.id},id=${form.id})}
              : @{/admin/alumnos/{alumnoId}/matriculas/nueva(alumnoId=${alumno.id})}"
            th:object="${form}"
            method="post"
          >
            <div class="form-group" th:if="${form.id == null}">
              <label for="imparticionId">Impartición</label>
              <select
                id="imparticionId"
                th:field="*{imparticionId}"
                class="form-control"
                th:classappend="${#fields.hasErrors('imparticionId')} ? 'is-invalid' : ''"
              >
                <option value="">-- Selecciona una impartición --</option>
                <option
                  th:each="imp : ${imparticiones}"
                  th:value="${imp.id}"
                  th:text="${imp.modulo.nombre + ' — ' + imp.grupo.nombre + ' (' + imp.centro.nombre + ')'}"
                ></option>
              </select>
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('imparticionId')}"
                th:errors="*{imparticionId}"
              ></div>
            </div>

            <div class="form-group">
              <label for="estado">Estado</label>
              <select
                id="estado"
                th:field="*{estado}"
                class="form-control"
                th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid' : ''"
              >
                <option value="">-- Selecciona un estado --</option>
                <option
                  th:each="e : ${estadosMatricula}"
                  th:value="${e}"
                  th:text="${e}"
                ></option>
              </select>
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('estado')}"
                th:errors="*{estado}"
              ></div>
            </div>

            <div class="form-group">
              <label>
                <input type="checkbox" th:field="*{esRepetidor}" />
                Es repetidor
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a
              th:href="@{/admin/alumnos/{id}/matriculas(id=${alumno.id})}"
              class="btn btn-secondary"
              >Cancelar</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
