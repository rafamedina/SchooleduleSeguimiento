<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Matrículas')}"></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('alumnos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <a th:href="@{/admin/alumnos}">Alumnos</a>
              <span class="breadcrumb__sep">/</span>
              <span th:text="${alumno.apellidos + ', ' + alumno.nombre}"
                >Alumno</span
              >
            </nav>
            <h1 class="hero__title">
              Matrículas de
              <em th:text="${alumno.nombre + ' ' + alumno.apellidos}"
                >Alumno</em
              >
            </h1>
          </div>
          <div class="hero__right">
            <a
              th:href="@{/admin/alumnos/{id}/matriculas/nueva(id=${alumno.id})}"
              class="btn btn-primary"
              >Nueva matrícula</a
            >
          </div>
        </div>

        <div class="animate-in">
          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <div th:if="${#lists.isEmpty(matriculas)}" class="empty-state">
            <p>Este alumno no tiene matrículas.</p>
            <a
              th:href="@{/admin/alumnos/{id}/matriculas/nueva(id=${alumno.id})}"
              class="btn btn-primary"
              >Crear la primera</a
            >
          </div>

          <table class="table" th:unless="${#lists.isEmpty(matriculas)}">
            <thead>
              <tr>
                <th>Módulo</th>
                <th>Grupo</th>
                <th>Centro</th>
                <th>Estado</th>
                <th>Repetidor</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="m : ${matriculas}">
                <td th:text="${m.moduloNombre}"></td>
                <td th:text="${m.grupoNombre}"></td>
                <td th:text="${m.centroNombre}"></td>
                <td th:text="${m.estado}"></td>
                <td th:text="${m.esRepetidor ? 'Sí' : 'No'}"></td>
                <td>
                  <a
                    th:href="@{/admin/alumnos/{alumnoId}/matriculas/{id}/editar(alumnoId=${alumno.id},id=${m.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:action="@{/admin/alumnos/{alumnoId}/matriculas/{id}/eliminar(alumnoId=${alumno.id},id=${m.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm btn-danger"
                      onclick="return confirm('¿Eliminar esta matrícula?')"
                    >
                      Eliminar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
