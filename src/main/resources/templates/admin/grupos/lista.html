<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/fragments/layout :: head('Grupos')}"></head>
  <body>
    <div class="admin-shell">
      <div th:replace="~{admin/fragments/layout :: sidebar('grupos')}"></div>

      <main class="admin-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a th:href="@{/admin/dashboard}">Administración</a>
              <span class="breadcrumb__sep">/</span>
              <span>Grupos</span>
            </nav>
            <h1 class="hero__title">Gestión de <em>Grupos</em></h1>
          </div>
          <div class="hero__right">
            <a th:href="@{/admin/grupos/nuevo}" class="btn btn-primary"
              >Nuevo grupo</a
            >
          </div>
        </div>

        <div class="animate-in">
          <form method="get" action="/admin/grupos" class="filter-bar">
            <select name="centroId">
              <option value="">Todos los centros</option>
              <option
                th:each="c : ${centros}"
                th:value="${c.id}"
                th:text="${c.nombre}"
                th:selected="${filtro != null and filtro.centroId() != null and filtro.centroId() == c.id}"
              ></option>
            </select>
            <select name="cursoAcademicoId">
              <option value="">Todos los años</option>
              <option
                th:each="cu : ${cursos}"
                th:value="${cu.id}"
                th:text="${cu.nombre}"
                th:selected="${filtro != null and filtro.cursoAcademicoId() != null and filtro.cursoAcademicoId() == cu.id}"
              ></option>
            </select>
            <button type="submit" class="btn btn-secondary btn-sm">
              Filtrar
            </button>
            <a th:href="@{/admin/grupos}" class="btn btn-sm">Limpiar</a>
          </form>

          <div
            th:if="${error}"
            class="alert alert-danger"
            th:text="${error}"
          ></div>

          <div th:if="${#lists.isEmpty(grupos)}" class="empty-state">
            <p>No hay grupos registrados.</p>
            <a th:href="@{/admin/grupos/nuevo}" class="btn btn-primary"
              >Crear el primero</a
            >
          </div>

          <table class="table" th:unless="${#lists.isEmpty(grupos)}">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Centro</th>
                <th>Curso Académico</th>
                <th>Tutor</th>
                <th>Imparticiones</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="g : ${grupos}">
                <td th:text="${g.nombre}"></td>
                <td th:text="${g.centroNombre}"></td>
                <td th:text="${g.cursoAcademicoNombre}"></td>
                <td
                  th:text="${g.tutorNombre != null ? g.tutorNombre : '—'}"
                ></td>
                <td th:text="${g.numImparticiones}"></td>
                <td>
                  <a
                    th:href="@{/admin/grupos/{id}/editar(id=${g.id})}"
                    class="btn btn-sm btn-secondary"
                    >Editar</a
                  >
                  <form
                    th:action="@{/admin/grupos/{id}/eliminar(id=${g.id})}"
                    method="post"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm btn-danger"
                      onclick="return confirm('¿Eliminar este grupo?')"
                    >
                      Eliminar
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
