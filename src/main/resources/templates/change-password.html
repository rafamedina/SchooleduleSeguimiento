<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cambiar contraseña — Schooledule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Geist:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="login-shell">
      <aside class="login-aside" aria-hidden="true">
        <span class="aside-word">Schoo&shy;ledule</span>
        <span class="aside-sub">Plataforma académica</span>
      </aside>

      <main class="login-main">
        <div class="login-card">
          <header class="login-card__header">
            <p class="login-card__eyebrow">Seguridad · Primer acceso</p>
            <h1 class="login-card__title">
              Cambia tu<br /><em>contraseña</em>
            </h1>
            <p style="color: #6b7280; font-size: 0.875rem; margin-top: 0.5rem">
              Tu cuenta usa una contraseña temporal. Debes establecer una nueva
              para continuar.
            </p>
          </header>

          <div
            th:if="${successMessage}"
            class="login-alert login-alert--ok"
            role="status"
            th:text="${successMessage}"
          ></div>

          <div
            th:if="${errorConfirm}"
            class="login-alert login-alert--error"
            role="alert"
            th:text="${errorConfirm}"
          ></div>

          <form
            method="post"
            th:action="@{/change-password}"
            th:object="${form}"
            class="login-form"
            novalidate
          >
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />

            <div class="login-form__group">
              <label class="login-form__label" for="nuevaPassword"
                >Nueva contraseña</label
              >
              <input
                class="login-form__input"
                type="password"
                id="nuevaPassword"
                th:field="*{nuevaPassword}"
                autocomplete="new-password"
                placeholder="Mín. 8 caracteres, mayúscula, número"
                required
              />
              <span
                th:if="${#fields.hasErrors('nuevaPassword')}"
                th:errors="*{nuevaPassword}"
                style="color: #dc2626; font-size: 0.8rem"
              ></span>
            </div>

            <div class="login-form__group">
              <label class="login-form__label" for="confirmarPassword"
                >Confirmar contraseña</label
              >
              <input
                class="login-form__input"
                type="password"
                id="confirmarPassword"
                th:field="*{confirmarPassword}"
                autocomplete="new-password"
                placeholder="Repite la contraseña"
                required
              />
              <span
                th:if="${#fields.hasErrors('confirmarPassword')}"
                th:errors="*{confirmarPassword}"
                style="color: #dc2626; font-size: 0.8rem"
              ></span>
            </div>

            <button type="submit" class="login-form__submit">
              Guardar y continuar
            </button>
          </form>

          <footer class="login-card__footer">
            <span>Schooledule</span>
            <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"
              >2026</span
            >
          </footer>
        </div>
      </main>
    </div>
  </body>
</html>
