<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">
      Schooledule
    </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        overflow-x: hidden;
        background-color: #f8f9fa;
      }
      #wrapper {
        display: flex;
        width: 100%;
      }
      #sidebar {
        min-width: 250px;
        max-width: 250px;
        min-height: 100vh;
        background: #212529;
        color: #fff;
        transition: all 0.3s;
      }
      #sidebar .sidebar-header {
        padding: 20px;
        background: #1a1d20;
      }
      #sidebar ul.components {
        padding: 20px 0;
      }
      #sidebar ul li a {
        padding: 10px 20px;
        font-size: 1.1em;
        display: block;
        color: #adb5bd;
        text-decoration: none;
      }
      #sidebar ul li a:hover {
        color: #fff;
        background: #343a40;
      }
      #sidebar ul li.active > a {
        color: #fff;
        background: #0d6efd;
      }
      #content {
        width: 100%;
        padding: 20px;
        transition: all 0.3s;
      }
      .sidebar-footer {
        position: absolute;
        bottom: 0;
        width: 250px;
        padding: 20px;
        background: #1a1d20;
      }
      @media (max-width: 768px) {
        #sidebar {
          margin-left: -250px;
        }
        #sidebar.active {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <!-- Sidebar -->
      <nav id="sidebar">
        <div class="sidebar-header">
          <h3>Schooledule</h3>
        </div>

        <ul class="list-unstyled components">
          <li th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
            <a href="/alumno/dashboard"
              ><i class="bi bi-speedometer2 me-2"></i> Dashboard</a
            >
          </li>
          <li th:classappend="${activePage == 'perfil' ? 'active' : ''}">
            <a href="/alumno/perfil"
              ><i class="bi bi-person me-2"></i> Mi Perfil</a
            >
          </li>
          <li th:classappend="${activePage == 'notas' ? 'active' : ''}">
            <a href="/alumno/notas"
              ><i class="bi bi-journal-text me-2"></i> Calificaciones</a
            >
          </li>
          <li th:classappend="${activePage == 'horario' ? 'active' : ''}">
            <a href="#"><i class="bi bi-calendar3 me-2"></i> Horario</a>
          </li>
        </ul>

        <div class="sidebar-footer">
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light w-100">
              <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
            </button>
          </form>
        </div>
      </nav>

      <!-- Page Content -->
      <div id="content">
        <nav
          class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4"
        >
          <div class="container-fluid">
            <button
              type="button"
              id="sidebarCollapse"
              class="btn btn-primary d-md-none"
            >
              <i class="bi bi-list"></i>
            </button>
            <div class="ms-auto">
              <span
                class="text-muted me-3"
                th:if="${#authentication.principal != null}"
                th:text="${#authentication.name}"
                >Usuario</span
              >
            </div>
          </div>
        </nav>

        <div class="container-fluid">
          <div layout:fragment="content">
            <!-- El contenido de las páginas irá aquí -->
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebarCollapse = document.getElementById("sidebarCollapse");
        const sidebar = document.getElementById("sidebar");
        if (sidebarCollapse) {
          sidebarCollapse.addEventListener("click", function () {
            sidebar.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
