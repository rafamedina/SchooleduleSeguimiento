<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title layout:title-pattern="$LAYOUT_TITLE — $CONTENT_TITLE">
      Schooledule
    </title>
    <link rel="stylesheet" th:href="@{/css/alumno.css}" />
  </head>
  <body>
    <div class="alumno-shell">
      <!-- Sidebar -->
      <nav class="alumno-sidebar">
        <div class="sidebar-wordmark">Schooledule</div>

        <ul class="sidebar-nav">
          <li>
            <a
              href="/alumno/dashboard"
              th:classappend="${activePage == 'dashboard' ? 'active' : ''}"
            >
              Dashboard
            </a>
          </li>
          <li>
            <a
              href="/alumno/perfil"
              th:classappend="${activePage == 'perfil' ? 'active' : ''}"
            >
              Mi Perfil
            </a>
          </li>
          <li>
            <a
              href="/alumno/notas"
              th:classappend="${activePage == 'notas' ? 'active' : ''}"
            >
              Calificaciones
            </a>
          </li>
        </ul>

        <div class="sidebar-footer">
          <form th:action="@{/logout}" method="post">
            <button
              type="submit"
              class="btn-editorial-ghost"
              style="width: 100%"
            >
              Cerrar Sesión
            </button>
          </form>
        </div>
      </nav>

      <!-- Page Content -->
      <main class="alumno-content">
        <div class="hero animate-in">
          <div class="hero__left">
            <nav class="breadcrumb">
              <a href="/alumno/dashboard">Schooledule</a>
              <span class="breadcrumb__sep">/</span>
              <span th:text="${activePage}">Dashboard</span>
            </nav>
            <h1 class="hero__title">Panel del <em>Alumno</em></h1>
          </div>
          <div class="hero__right">
            <div
              class="hero__body"
              th:if="${#authentication.principal != null}"
            >
              Bienvenido,
              <span th:text="${#authentication.name}">Usuario</span>.
            </div>
          </div>
        </div>

        <div class="animate-in">
          <div layout:fragment="content">
            <!-- El contenido de las páginas irá aquí -->
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
