<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil de Alumno - Schooledule</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .profile-header {
        background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        color: white;
        border-radius: 15px 15px 0 0;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/alumno/dashboard">Schooledule</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" href="/alumno/perfil">Mi Perfil</a>
          <a class="nav-link" href="/alumno/notas">Mis Notas</a>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link nav-link">
              Cerrar Sesión
            </button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="profile-header text-center">
              <h2 th:text="${profile.nombre + ' ' + profile.apellidos}">
                Nombre del Alumno
              </h2>
              <p class="mb-0" th:text="${profile.email}">email@ejemplo.com</p>
            </div>
            <div class="card-body p-4">
              <div class="row mb-3">
                <div class="col-sm-4 fw-bold">Usuario:</div>
                <div class="col-sm-8" th:text="${profile.username}">
                  username
                </div>
              </div>
              <hr />
              <div class="row mb-3">
                <div class="col-sm-4 fw-bold">Centro:</div>
                <div class="col-sm-8" th:text="${profile.centroNombre}">
                  Nombre del Centro
                </div>
              </div>
              <hr />
              <div class="row mb-3">
                <div class="col-sm-4 fw-bold">Grupo:</div>
                <div class="col-sm-8" th:text="${profile.grupoNombre}">
                  Nombre del Grupo
                </div>
              </div>
              <hr />
              <div class="row mb-3">
                <div class="col-sm-4 fw-bold">Curso Académico:</div>
                <div class="col-sm-8" th:text="${profile.cursoAcademico}">
                  2025/2026
                </div>
              </div>
            </div>
            <div class="card-footer text-center p-3">
              <a href="/alumno/dashboard" class="btn btn-secondary"
                >Volver al Menú</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
