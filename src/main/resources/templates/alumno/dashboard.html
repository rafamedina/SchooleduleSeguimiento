<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{alumno/fragments/layout :: head('Mis clases')}"></head>
  <body>
    <div th:replace="~{alumno/fragments/layout :: topnav('dashboard')}"></div>

    <main class="page-content">
      <div class="hero animate-in">
        <h1 class="hero__title">Mis<br /><em>clases</em></h1>
        <p class="hero__body" th:text="${alumnoNombre}">Ana López</p>
      </div>

      <ul
        th:if="${!asignaturas.isEmpty()}"
        class="asignatura-grid"
        id="asignaturaGrid"
        aria-label="Listado de clases"
      >
        <li
          th:each="m : ${asignaturas}"
          class="asignatura-card animate-in"
          role="button"
          tabindex="0"
          th:data-matricula-id="${m.id}"
          th:aria-label="'Ver calificaciones de ' + ${m.imparticion.modulo.nombre}"
        >
          <span
            class="asignatura-card__label"
            th:text="${m.imparticion.modulo.nombre}"
            >Desarrollo Web</span
          >
          <span
            class="asignatura-card__meta"
            th:text="${m.imparticion.grupo.nombre} + ' · ' + ${m.imparticion.centro.nombre}"
          >
            DAW1-A · IES Central
          </span>
        </li>
      </ul>

      <div th:if="${asignaturas.isEmpty()}" class="empty-state animate-in">
        <p class="empty-state__title">Sin matrículas activas.</p>
        <p class="empty-state__body">
          Contacta con tu centro para revisar tu matrícula.
        </p>
      </div>
    </main>

    <div th:replace="~{alumno/fragments/layout :: colophon}"></div>

    <!-- ── Modal de calificaciones (read-only) ───────────────────────────── -->
    <dialog
      id="gradesModal"
      aria-labelledby="gradesModalTitle"
      aria-modal="true"
    >
      <div class="modal-layout">
        <header class="modal-header">
          <h2 id="gradesModalTitle" class="modal-header__name">—</h2>
          <span id="gradesModalLabel" class="modal-header__label"></span>
          <button
            class="modal-close"
            id="closeGradesTop"
            aria-label="Cerrar modal"
          >
            ✕
          </button>
        </header>

        <div class="modal-body" id="gradesBody">
          <!-- Relleno por JS -->
        </div>

        <footer class="modal-footer">
          <div class="media-global-display">
            Media global <strong id="mediaGlobal">—</strong>
          </div>
          <div class="btn-group">
            <button id="closeGrades" class="btn-editorial-ghost">Cerrar</button>
          </div>
        </footer>
      </div>
    </dialog>

    <script defer th:src="@{/js/alumno-perfil-menu.js}"></script>
    <script type="module" th:src="@{/js/alumno-grades.js}"></script>
  </body>
</html>
