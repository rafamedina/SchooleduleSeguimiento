<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{profe/fragments/layout :: head('Alumnos (Tutor)')}"
  ></head>
  <body>
    <div th:replace="~{profe/fragments/layout :: topnav('tutor')}"></div>

    <main class="page-content">
      <nav class="breadcrumb animate-in" aria-label="Ruta de navegación">
        <a th:href="@{/profe/dashboard}">Dashboard</a>
        <span class="breadcrumb__sep">·</span>
        <a th:href="@{/tutor/grupos}">Mis Grupos</a>
        <span class="breadcrumb__sep">·</span>
        <a th:href="@{/tutor/grupo/{id}/imparticiones(id=${grupoId})}"
          >Módulos</a
        >
        <span class="breadcrumb__sep">·</span>
        <span>Alumnos</span>
      </nav>

      <!-- Hero -->
      <div class="hero animate-in">
        <div>
          <h1
            class="hero__title"
            th:if="${imparticionLabel != null and #strings.contains(imparticionLabel,'·')}"
          >
            <span
              th:text="${#strings.substringBefore(imparticionLabel, '·').trim()}"
              >1DAW-A</span
            >
            <br />
            <em
              th:text="${#strings.substringAfter(imparticionLabel, '·').trim()}"
              >Módulo</em
            >
          </h1>
          <h1
            class="hero__title"
            th:unless="${imparticionLabel != null and #strings.contains(imparticionLabel,'·')}"
            th:text="${imparticionLabel}"
          >
            Impartición
          </h1>
        </div>
        <p class="hero__body" th:if="${!alumnos.isEmpty()}">
          <span th:text="${alumnos.size()}">0</span> alumno(s) activo(s). Vista
          de <strong>solo lectura</strong> — no eres el profesor de este módulo.
        </p>
      </div>

      <!-- Listado de alumnos -->
      <ul
        th:if="${!alumnos.isEmpty()}"
        class="roster"
        id="rosterList"
        aria-label="Listado de alumnos"
      >
        <li
          th:each="alumno, iter : ${alumnos}"
          class="roster__item animate-in"
          role="button"
          tabindex="0"
          th:data-matricula-id="${alumno.matriculaId}"
          th:aria-label="'Ver calificaciones de ' + ${alumno.nombreCompleto}"
        >
          <span
            class="roster__serial"
            th:text="${iter.count < 10 ? '0' + iter.count : iter.count}"
            >01</span
          >

          <div>
            <span class="roster__name" th:text="${alumno.nombreCompleto}"
              >Ana López</span
            >
            <span class="roster__email" th:text="${alumno.email}"
              >ana@t.com</span
            >
          </div>

          <span class="chip chip--hot" th:if="${alumno.esRepetidor}"
            >Repetidor</span
          >
          <span
            class="chip chip--danger"
            th:if="${alumno.cesSuspensas > 0}"
            th:text="${alumno.cesSuspensas + ' CE(s) suspensa(s)'}"
          ></span>
        </li>
      </ul>

      <div th:if="${alumnos.isEmpty()}" class="empty-state animate-in">
        <p class="empty-state__title">Sin alumnos activos.</p>
        <p class="empty-state__body">
          No hay matrículas activas para este módulo.
        </p>
      </div>
    </main>

    <div th:replace="~{profe/fragments/layout :: colophon}"></div>

    <!-- Modal de calificaciones (solo lectura) -->
    <dialog
      id="gradesModal"
      aria-labelledby="gradesModalTitle"
      aria-modal="true"
    >
      <div class="modal-layout">
        <header class="modal-header">
          <h2 id="gradesModalTitle" class="modal-header__name">—</h2>
          <span id="gradesModalLabel" class="modal-header__label"></span>
          <button
            class="modal-close"
            id="closeGradesTop"
            aria-label="Cerrar modal"
          >
            ✕
          </button>
        </header>

        <div class="modal-body" id="gradesBody">
          <!-- Relleno por JS -->
        </div>

        <footer class="modal-footer">
          <div class="media-global-display">
            Media global <strong id="mediaGlobal">—</strong>
          </div>
          <div class="btn-group">
            <button id="closeGrades" class="btn-editorial-ghost">Cerrar</button>
          </div>
        </footer>
      </div>
    </dialog>

    <!-- JS de notas en modo lectura (endpoint /tutor/api/...) -->
    <script th:inline="javascript">
      /*<![CDATA[*/
      const NOTAS_API_BASE = [[@{/tutor/api/matricula/}]];
      const READ_ONLY = true;
      /*]]>*/
    </script>
    <script type="module" th:src="@{/js/profe-grades.js}"></script>
  </body>
</html>
