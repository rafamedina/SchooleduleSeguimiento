<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{profe/fragments/layout :: head('Imparticiones del Grupo')}"
  ></head>
  <body>
    <div th:replace="~{profe/fragments/layout :: topnav('tutor')}"></div>

    <main class="page-content">
      <nav class="breadcrumb animate-in" aria-label="Ruta de navegación">
        <a th:href="@{/profe/dashboard}">Dashboard</a>
        <span class="breadcrumb__sep">·</span>
        <a th:href="@{/tutor/grupos}">Mis Grupos</a>
        <span class="breadcrumb__sep">·</span>
        <span th:text="${grupoNombre}">Grupo</span>
      </nav>

      <div class="hero animate-in">
        <div>
          <h1 class="hero__title" th:text="${grupoNombre}">1DAW-A</h1>
          <p
            style="
              font-family: var(--font-display);
              font-style: italic;
              font-size: 1rem;
              color: var(--ink-muted);
              margin-top: 0.4rem;
            "
          >
            Módulos impartidos
          </p>
        </div>
        <p class="hero__body" th:if="${!imparticiones.isEmpty()}">
          <span th:text="${imparticiones.size()}">0</span> módulo(s) en este
          grupo.
        </p>
      </div>

      <div th:if="${!imparticiones.isEmpty()}" class="animate-in">
        <table class="subject-table" aria-label="Imparticiones del grupo">
          <thead>
            <tr>
              <th scope="col">Módulo</th>
              <th scope="col">Profesor</th>
              <th scope="col">Alumnos</th>
              <th scope="col">Acceso</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="imp : ${imparticiones}" class="animate-in">
              <td>
                <a
                  class="subject-row-link"
                  th:href="@{/tutor/grupo/{gid}/alumnos/{iid}(gid=${grupoId},iid=${imp.imparticionId})}"
                  th:text="${imp.moduloNombre}"
                  >Programación</a
                >
              </td>
              <td th:text="${imp.profesorNombre}">Luis Pérez</td>
              <td class="subject-table__num" th:text="${imp.numAlumnos}">20</td>
              <td>
                <span
                  th:if="${imp.puedeEditarNotas}"
                  class="badge badge--ok"
                  title="Eres también el profesor: puedes editar notas"
                  >Editar notas</span
                >
                <span
                  th:unless="${imp.puedeEditarNotas}"
                  class="badge badge--muted"
                  title="Solo lectura"
                  >Solo lectura</span
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div th:if="${imparticiones.isEmpty()}" class="empty-state animate-in">
        <p class="empty-state__title">Sin imparticiones.</p>
        <p class="empty-state__body">
          Este grupo no tiene módulos asignados este curso.
        </p>
      </div>
    </main>

    <div th:replace="~{profe/fragments/layout :: colophon}"></div>
  </body>
</html>
