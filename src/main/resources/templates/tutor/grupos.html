<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{profe/fragments/layout :: head('Mis Grupos')}"></head>
  <body>
    <div th:replace="~{profe/fragments/layout :: topnav('tutor')}"></div>

    <main class="page-content">
      <nav class="breadcrumb animate-in" aria-label="Ruta de navegación">
        <a th:href="@{/profe/dashboard}">Dashboard</a>
        <span class="breadcrumb__sep">·</span>
        <span>Mis Grupos (Tutor)</span>
      </nav>

      <div class="hero animate-in">
        <div>
          <h1 class="hero__title">Tus<br /><em>grupos</em></h1>
        </div>
        <p class="hero__body" th:if="${!grupos.isEmpty()}">
          Eres tutor de
          <span th:text="${grupos.size()}">0</span> grupo(s). Puedes consultar
          sus alumnos y calificaciones.
        </p>
      </div>

      <ul
        th:if="${!grupos.isEmpty()}"
        class="ledger"
        aria-label="Grupos asignados"
      >
        <li th:each="grupo, iter : ${grupos}" class="animate-in">
          <a
            th:href="@{/tutor/grupo/{id}/imparticiones(id=${grupo.grupoId})}"
            class="ledger__row"
            th:title="${grupo.grupoNombre} + ' — ' + ${grupo.numImparticiones} + ' imparticiones'"
          >
            <span
              class="ledger__serial"
              th:text="'—' + ${#strings.length(iter.count.toString()) == 1 ? '0' + iter.count : iter.count}"
              >—01</span
            >

            <div class="ledger__main">
              <span class="ledger__name" th:text="${grupo.grupoNombre}"
                >1DAW-A</span
              >
              <span
                class="ledger__meta"
                th:text="${grupo.centroNombre} + ' · ' + ${grupo.cursoNombre}"
              >
                IES Test · 2024/2025
              </span>
            </div>

            <div>
              <span
                class="ledger__count tabular"
                th:text="${grupo.numImparticiones}"
                >2</span
              >
              <span class="ledger__count-label">módulos</span>
            </div>
          </a>
        </li>
      </ul>

      <div th:if="${grupos.isEmpty()}" class="empty-state animate-in">
        <p class="empty-state__title">Sin grupos asignados.</p>
        <p class="empty-state__body">
          No eres tutor de ningún grupo. Contacta con el administrador del
          centro.
        </p>
      </div>
    </main>

    <div th:replace="~{profe/fragments/layout :: colophon}"></div>
  </body>
</html>
